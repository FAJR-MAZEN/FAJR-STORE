<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر فجر</title>

<style>

body{
background:#0b1a2a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
}

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:40px;
}

.card{
background:#142a44;
border-radius:15px;
padding:20px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#ffd700;
font-size:20px;
margin:10px 0;
}

button{
background:#ff7a00;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ff9c33;
}

</style>

</head>

<body>

<h1>متجر فجر</h1>
<h2>المنتجات</h2>

<div class="products">

<div class="card">
<img src="fajr-al-bidaya.jpeg">
<h3>البداية</h3>
<p class="price">39 ريال</p>
<button>إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-arabian-dawn.jpeg">
<h3>الفجر العربي</h3>
<p class="price">59 ريال</p>
<button>إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-icy-fresh.jpeg">
<h3>آيسي فريش</h3>
<p class="price">59 ريال</p>
<button>إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-dawn-rise.jpeg">
<h3>الفجر المشتعل</h3>
<p class="price">99 ريال</p>
<button>إضافة للسلة</button>
</div>

</div>

</body>
</html>
