<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر فجر</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial, sans-serif;
color:white;
text-align:center;
min-height:100vh;

/* خلفية الفجر */
background:
radial-gradient(circle at 50% 110%, rgba(255,120,0,0.55), transparent 40%),
radial-gradient(circle at 50% 120%, rgba(255,80,0,0.35), transparent 45%),
linear-gradient(180deg,#142a52 0%, #0b1a2a 40%, #050a15 100%);

position:relative;
overflow-x:hidden;
}

/* النجوم */
body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
radial-gradient(2px 2px at 10% 20%, white, transparent),
radial-gradient(2px 2px at 25% 15%, white, transparent),
radial-gradient(2px 2px at 40% 25%, white, transparent),
radial-gradient(2px 2px at 60% 18%, white, transparent),
radial-gradient(2px 2px at 75% 10%, white, transparent),
radial-gradient(2px 2px at 85% 22%, white, transparent),
radial-gradient(2px 2px at 50% 12%, white, transparent);
opacity:.8;
}

/* شريط علوي */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#081321;
font-size:22px;
}

.cart-btn{
cursor:pointer;
background:#ff8a00;
padding:8px 14px;
border-radius:8px;
}

/* المنتجات */
.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:40px 20px;
}

.card{
background:#142a44;
padding:15px;
border-radius:15px;
width:240px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#ffd700;
font-size:20px;
margin:10px 0;
}

button{
background:#ff8a00;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
color:white;
font-size:14px;
margin:5px;
}

button:hover{
background:#ff6a00;
}

/* السلة */
.cart-box{
position:fixed;
top:0;
left:0;
width:300px;
height:100%;
background:#081321;
padding:20px;
transform:translateX(-100%);
transition:.3s;
overflow:auto;
}

.cart-box.active{
transform:translateX(0);
}

.cart-item{
margin:10px 0;
border-bottom:1px solid #333;
padding-bottom:6px;
}

.whatsapp{
background:#25D366;
margin-top:10px;
}
</style>
</head>

<body>

<div class="topbar">
<div>🌅 متجر فجر</div>
<div class="cart-btn" onclick="toggleCart()">🛒 السلة (<span id="count">0</span>)</div>
</div>

<div class="cart-box" id="cartBox">
<h2>السلة</h2>
<div id="cartItems"></div>
<p>الإجمالي: <span id="total">0</span> ريال</p>
<button class="whatsapp" onclick="sendOrder()">إرسال الطلب واتساب</button>
</div>

<h1 style="margin-top:30px;color:#ffb347;">المنتجات</h1>

<div class="products">

<div class="card">
<img src="fajr-al-bidaya.jpeg">
<h3>البداية</h3>
<p class="price">39 ريال</p>
<button onclick="addCart('البداية',39)">إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-arabian-dawn.jpeg">
<h3>الفجر العربي</h3>
<p class="price">49 ريال</p>
<button onclick="addCart('الفجر العربي',49)">إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-icy-fresh.jpeg">
<h3>آيسي فريش</h3>
<p class="price">59 ريال</p>
<button onclick="addCart('آيسي فريش',59)">إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-dawn-rise.jpeg">
<h3>المؤسس
