<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>FAJR Store</title>
<style>
:root{
  --bg:#0b1020;
  --accent:#ff7a3d;
  --text:#ffffff;
}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#0b1020;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}
.spinner{
  width:60px;
  height:60px;
  border:4px solid #333;
  border-top:4px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg)}
}
.logo{
  margin-top:20px;
  font-size:28px;
  letter-spacing:4px;
  color:var(--accent);
}

/* HEADER */
header{
  padding:25px;
  text-align:center;
  font-size:28px;
  font-weight:700;
  letter-spacing:2px;
}

/* PRODUCTS */
.grid{
  max-width:900px;
  margin:auto;
  padding:20px;
  display:grid;
  gap:25px;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
}

.card{
  background:#141a34;
  border-radius:16px;
  overflow:hidden;
  transition:0.25s;
}
.card:hover{
  transform:translateY(-4px);
}
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}
.card-body{
  padding:15px;
}
.title{
  font-size:18px;
  margin-bottom:8px;
}
.price{
  color:var(--accent);
  margin-bottom:12px;
}
button{
  width:100%;
  padding:10px;
  border:none;
  background:var(--accent);
  color:#000;
  font-weight:600;
  border-radius:8px;
  cursor:pointer;
}
footer{
  text-align:center;
  padding:25px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
<div class="logo">FAJR</div>
</div>

<header>متجر الفجر</header>

<section class="grid">

<div class="card">
<img src="fajr-arabian-dawn.jpeg">
<div class="card-body">
<div class="title">FAJR Arabian Dawn</div>
<div class="price">30 ريال</div>
<button onclick="order('FAJR Arabian Dawn')">اطلب الآن</button>
</div>
</div>

<div class="card">
<img src="fajr-dawn-rise.jpeg">
<div class="card-body">
<div class="title">FAJR Dawn Rise</div>
<div class="price">30 ريال</div>
<button onclick="order('FAJR Dawn Rise')">اطلب الآن</button>
</div>
</div>

<div class="card">
<img src="fajr-icy-fresh.jpeg">
<div class="card-body">
<div class="title">FAJR Icy Fresh</div>
<div class="price">30 ريال</div>
<button onclick="order('FAJR Icy Fresh')">اطلب الآن</button>
</div>
</div>

</section>

<footer>FAJR Energy</footer>

<script>

/* إخفاء شاشة التحميل */
window.addEventListener("load",function(){
  document.getElementById("loader").style.display="none";
});

/* طلب عبر واتساب */
function order(name){
  const phone="966548659564";
  const text="أبغى أطلب "+name+" من متجر FAJR";
  window.open(
    "https://wa.me/"+phone+"?text="+encodeURIComponent(text),
    "_blank"
  );
}

</script>

</body>
</html>
